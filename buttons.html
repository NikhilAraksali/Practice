<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
.sub_button
{
    background-color: red;
    color: white;
    border: none;
    height: 30px;
    width: 100px;
    border-radius: 3px;
    cursor: pointer;
    margin-right: 5px;

}
.sub_button:hover
{
opacity: 0.8;

}
.sub_button:active
{
background-color: palevioletred;

}

.dont_button
{
background-color: white;
color: cornflowerblue;
border-color:cornflowerblue;
height: 30px;
border-width: 1px;
margin-right: 5px;
    cursor: pointer;

}
.nothing_button
{
height: 30px;
background-color: rgb(67, 89, 216);
color: white;
border: 1px;
width: 80px;
border-radius: 20px;
font-weight: bold;
    cursor: pointer;
    box-shadow: 10px 10px 15px rgb(146, 142, 142);

}

</style>
<button class="sub_button">click</button>
<button class="dont_button">dont</button>
<button class="nothing_button">nothing</button>

</body>
</html>
